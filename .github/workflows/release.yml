name: Release — Build & Push to DockerHub

on:
  push:
    tags:
      - 'v*.*.*'    # triggers on v1.0.0, v1.2.3, etc.
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------
  # Job 1: Build and push Docker image to DockerHub
  # ---------------------------------------------------------------
  release-keypilot:
    name: Build & Push KeyPilot Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/keypilot-test
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Summarise release
        run: |
          echo "## 🚀 Release ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image pushed to DockerHub:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ secrets.DOCKERHUB_USERNAME }}/keypilot:${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ secrets.DOCKERHUB_USERNAME }}/keypilot:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------
  # Job 2: Build and release Go CLI binaries
  # ---------------------------------------------------------------
  release-cli:
    name: Build & Release CLI Binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build CLI for all platforms
        run: |
          cd cli
          mkdir -p dist

          VERSION=${{ steps.version.outputs.VERSION }}
          LDFLAGS="-X main.version=${VERSION}"

          GOOS=darwin  GOARCH=amd64  go build -ldflags "$LDFLAGS" -o dist/keypilot-darwin-amd64  .
          GOOS=darwin  GOARCH=arm64  go build -ldflags "$LDFLAGS" -o dist/keypilot-darwin-arm64  .
          GOOS=linux   GOARCH=amd64  go build -ldflags "$LDFLAGS" -o dist/keypilot-linux-amd64   .
          GOOS=windows GOARCH=amd64  go build -ldflags "$LDFLAGS" -o dist/keypilot-windows-amd64.exe .

          cd dist && sha256sum * > checksums.txt

      - name: Create GitHub Release with binaries
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            ## What's New
            See CHANGELOG.md for details.

            ## Docker (Recommended)
            ```bash
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/keypilot:${{ steps.version.outputs.VERSION }}
            docker run -d -p 4000:4000 -v ~/.keypilot-cli:/config \
            ${{ secrets.DOCKERHUB_USERNAME }}/keypilot:${{ steps.version.outputs.VERSION }}
            ```

            ## CLI Installation
            Download the binary for your platform below, make it executable, and add to PATH.

            ```bash
            # macOS (Apple Silicon)
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/keypilot-darwin-arm64 \
            -o keypilot && chmod +x keypilot && mv keypilot /usr/local/bin/
            ```

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            cli/dist/keypilot-darwin-amd64
            cli/dist/keypilot-darwin-arm64
            cli/dist/keypilot-linux-amd64
            cli/dist/keypilot-windows-amd64.exe
            cli/dist/checksums.txt
          draft: false
          prerelease: false