# .github/workflows/ci.yml
name: CI — Test & Build

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main ]

jobs:
  # ---------------------------------------------------------------
  # Job 1: Run all Spring Boot tests
  # ---------------------------------------------------------------
  test-keypilot:
    name: KeyPilot Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven          # caches ~/.m2 between runs — faster CI

      - name: Run unit tests
        run: ./mvnw test
        # Surefire runs unit tests only (no IT suffix classes)

      - name: Run integration tests
        run:  ./mvnw verify
        # Failsafe runs integration tests

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/

  # ---------------------------------------------------------------
  # Job 2: Run Go CLI tests
  # ---------------------------------------------------------------
  test-cli:
    name: CLI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true           # caches Go module downloads

      - name: Run CLI tests
        run: |
          cd cli
          go test ./... -v -race
        # -race detects data races — important for concurrent code

      - name: Verify CLI builds
        run: |
          cd cli
          go build -o /dev/null .
        # Just verifies it compiles — no artifact stored

  # ---------------------------------------------------------------
  # Job 3: Verify Docker build (but don't push on CI)
  # ---------------------------------------------------------------
  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-keypilot, test-cli]   # only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false           # verify it builds — don't publish
          tags: riviyaaa/keypilot:ci-check
          cache-from: type=gha  # GitHub Actions cache for Docker layers
          cache-to: type=gha,mode=max