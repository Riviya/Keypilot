server.port=4000
spring.application.name=keypilot-gateway

# Key storage
keypilot.storage.path=${user.home}/.keypilot-cli/keys.json

# Default provider
keypilot.default-provider=openai

# OpenAI ? Bearer token auth
keypilot.providers.openai.base-url=https://api.openai.com
keypilot.providers.openai.auth-type=BEARER

# Anthropic ? Bearer token auth
keypilot.providers.anthropic.base-url=https://api.anthropic.com
keypilot.providers.anthropic.auth-type=BEARER

# Gemini ? Query parameter auth
keypilot.providers.gemini.base-url=https://generativelanguage.googleapis.com
keypilot.providers.gemini.auth-type=QUERY_PARAM
keypilot.providers.gemini.auth-param-name=key

# Logging
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n
logging.level.com.yourname.gateway=INFO

# Retry configuration
# How many times to retry with a different key on 429
keypilot.retry.max-attempts=3