server.port=4000
spring.application.name=keypilot-gateway

# Key storage
gateway.storage.path=${user.home}/.cli/keys.json

# Default provider
gateway.default-provider=openai

# OpenAI ? Bearer token auth
gateway.providers.openai.base-url=https://api.openai.com
gateway.providers.openai.auth-type=BEARER

# Anthropic ? Bearer token auth
gateway.providers.anthropic.base-url=https://api.anthropic.com
gateway.providers.anthropic.auth-type=BEARER

# Gemini ? Query parameter auth
gateway.providers.gemini.base-url=https://generativelanguage.googleapis.com
gateway.providers.gemini.auth-type=QUERY_PARAM
gateway.providers.gemini.auth-param-name=key

# Logging
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n
logging.level.com.yourname.gateway=INFO